---
- name: debian | Installing Pre-Req Packages
  ansible.builtin.apt:
    name: ["lldpd"]
    state: present
  become: true
  register: result
  until: result is successful
  when: config_install_lldp | bool

- name: debian | Installing ifupdown2
  ansible.builtin.apt:
    name: ["ifupdown2"]
    state: present
  become: true
  register: result
  until: result is successful
  when: config_install_ifupdown2 | bool

- name: debian | Installing bridge-utils
  ansible.builtin.apt:
    name: ["bridge-utils"]
    state: present
  become: true
  register: result
  until: result is successful
  when: config_network_bridges

- name: debian | Installing Bonding Packages
  ansible.builtin.apt:
    name: ["ifenslave"]
    state: present
  become: true
  register: result
  until: result is successful
  when: config_network_bonds

# Don't install vlan package for proxmox-ve
- name: debian | Installing VLAN Packages
  ansible.builtin.apt:
    name: ["vlan"]
    state: present
  become: true
  register: result
  until: result is successful
  when:
    - config_network_vlans
    - "'proxmox-ve' not in ansible_facts.packages"

- name: debian | Configuring Defined Interfaces
  ansible.builtin.template:
    src: "{{ config_interface_template }}"
    dest: /etc/network/interfaces
    owner: root
    group: root
    mode: u=rw,g=r,o=r
    backup: true
  register: config_interface
  become: true
  when:
    - config_network_interfaces is defined
    - config_network_interfaces
  notify: enable networking

- name: debian | Restart networking.service
  ansible.builtin.service:
    name: networking
    state: restarted
  when:
    - enable_configured_interfaces_after_defining
    - config_interface["changed"]
